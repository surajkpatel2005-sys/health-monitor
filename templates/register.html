{% extends 'base.html' %}
{% block title %}register{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="auth-card">
          <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill auth-icon"></i>
            <h3 class="fw-bold mt-2">Create Your Account</h3>
            <p class="text-muted small">Start tracking your health today — it's free</p>
          </div>
          <form method="POST" action="{{ url_for('register') }}" id="registerForm" novalidate>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="John Doe" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="tel" name="phone" class="form-control" placeholder="9876543210" required>
              </div>
              <div class="col-md-3">
                <label class="form-label">Age</label>
                <input type="number" name="age" min="1" max="120" class="form-control" placeholder="25" required>
              </div>
              <div class="col-md-3">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-select" required>
                  <option value="" selected disabled>Select</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
              </div>
              <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Re-enter password" required minlength="6">
              </div>
              <div class="col-12">
                <small id="passwordMatchMsg" class="form-text"></small>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-auth-submit w-100 mt-2"><i class="bi bi-person-plus me-2"></i>Create Account</button>
              </div>
            </div>
          </form>
          <p class="text-center text-muted small mt-4 mb-0">
            Already have an account? <a href="{{ url_for('login') }}" class="fw-semibold">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('confirm_password').addEventListener('input', function() {
  const pass = document.getElementById('password').value;
  const confirm = this.value;
  const msg = document.getElementById('passwordMatchMsg');
  if (confirm.length === 0) { msg.textContent = ''; return; }
  if (pass === confirm) {
    msg.textContent = 'Passwords match ✓';
    msg.className = 'form-text text-success';
  } else {
    msg.textContent = 'Passwords do not match';
    msg.className = 'form-text text-danger';
  }
});
</script>
{% endblock %}
