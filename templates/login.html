{% extends 'base.html' %}
{% block title %}login{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="auth-card">
          <div class="text-center mb-4">
            <i class="bi bi-heart-pulse-fill auth-icon"></i>
            <h3 class="fw-bold mt-2">Welcome Back</h3>
            <p class="text-muted small">Log in to continue your wellness journey</p>
          </div>
          <form method="POST" action="{{ url_for('login') }}" novalidate>
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                <span class="input-group-text toggle-password" onclick="togglePassword('password', this)"><i class="bi bi-eye"></i></span>
              </div>
            </div>
            <button type="submit" class="btn btn-auth-submit w-100 mt-2"><i class="bi bi-box-arrow-in-right me-2"></i>Login</button>
          </form>
          <p class="text-center text-muted small mt-4 mb-0">
            Don't have an account? <a href="{{ url_for('register') }}" class="fw-semibold">Register here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
